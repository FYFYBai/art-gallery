spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: art-gallery-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/artgallery}
    username: ${DB_USERNAME:artgallery}
    password: ${DB_PASSWORD:artgallery}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
            scope: openid,profile,email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:placeholder-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:placeholder-facebook-client-secret}
            scope: email,public_profile
          instagram:
            client-id: ${INSTAGRAM_CLIENT_ID:placeholder-instagram-client-id}
            client-secret: ${INSTAGRAM_CLIENT_SECRET:placeholder-instagram-client-secret}
            scope: user_profile,user_media
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Instagram
        provider:
          instagram:
            authorization-uri: https://api.instagram.com/oauth/authorize
            token-uri: https://api.instagram.com/oauth/access_token
            user-info-uri: https://graph.instagram.com/me
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
    expiration-ms: 3600000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}

  email:
    from: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
    verification-token-ttl-hours: ${EMAIL_VERIFICATION_TOKEN_TTL_HOURS:24}
    password-reset-token-ttl-hours: ${PASSWORD_RESET_TOKEN_TTL_HOURS:1}
    resend:
      api-key: ${RESEND_API_KEY:}

  admin:
    dev-account-delete-enabled: ${ADMIN_DEV_ACCOUNT_DELETE_ENABLED:true}

server:
  port: 8080

logging:
  level:
    com.artgallery: INFO
    org.flywaydb: INFO
    org.springframework.security: WARN
